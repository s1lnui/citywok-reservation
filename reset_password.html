{% extends "base.html" %}

{% block content %}
<style>
    .reset-container {
        max-width: 500px;
        margin: 3rem auto;
        animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .reset-box {
        background: rgba(139, 0, 0, 0.3);
        padding: 2rem;
        border-radius: 15px;
        border: 2px solid rgba(212, 175, 55, 0.3);
        animation: slideUp 0.8s ease-out;
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .reset-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .reset-header h2 {
        color: #ffd700;
        font-size: 2rem;
        margin-bottom: 0.5rem;
    }

    .reset-header p {
        color: #d4af37;
        font-size: 0.95rem;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: #ffd700;
        font-weight: bold;
    }

    .form-control {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #d4af37;
        border-radius: 5px;
        background: #2d1f1f;
        color: #d4af37;
        transition: all 0.3s ease;
    }

    .form-control:focus {
        outline: none;
        border-color: #ffd700;
        box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
    }

    .submit-btn {
        width: 100%;
        padding: 1rem;
        background: linear-gradient(135deg, #d4af37 0%, #ffd700 100%);
        color: #1a0000;
        border: none;
        border-radius: 5px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .submit-btn:hover {
        transform: scale(1.02);
        box-shadow: 0 5px 20px rgba(212, 175, 55, 0.5);
    }

    .info-text {
        color: #999;
        font-size: 0.85rem;
        margin-top: 0.5rem;
    }
</style>

<div class="reset-container">
    <div class="reset-box">
        <div class="reset-header">
            <h2>Reset Password</h2>
            <p>Enter your new password</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="new_password" class="form-control" required minlength="6">
                <p class="info-text">Password must be at least 6 characters long</p>
            </div>

            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" name="confirm_password" class="form-control" required>
            </div>

            <button type="submit" class="submit-btn">Reset Password</button>
        </form>
    </div>
</div>
{% endblock %}
