{% extends "base.html" %}

{% block content %}
<style>
    .forgot-container {
        max-width: 500px;
        margin: 3rem auto;
        animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .forgot-box {
        background: rgba(139, 0, 0, 0.3);
        padding: 2rem;
        border-radius: 15px;
        border: 2px solid rgba(212, 175, 55, 0.3);
        animation: slideUp 0.8s ease-out;
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .forgot-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .forgot-header h2 {
        color: #ffd700;
        font-size: 2rem;
        margin-bottom: 0.5rem;
    }

    .forgot-header p {
        color: #d4af37;
        font-size: 0.95rem;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: #ffd700;
        font-weight: bold;
    }

    .form-control {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #d4af37;
        border-radius: 5px;
        background: #2d1f1f;
        color: #d4af37;
        transition: all 0.3s ease;
    }

    .form-control:focus {
        outline: none;
        border-color: #ffd700;
        box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
    }

    .submit-btn {
        width: 100%;
        padding: 1rem;
        background: linear-gradient(135deg, #d4af37 0%, #ffd700 100%);
        color: #1a0000;
        border: none;
        border-radius: 5px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .submit-btn:hover {
        transform: scale(1.02);
        box-shadow: 0 5px 20px rgba(212, 175, 55, 0.5);
    }

    .back-link {
        text-align: center;
        margin-top: 1.5rem;
    }

    .back-link a {
        color: #d4af37;
        text-decoration: none;
        transition: color 0.3s ease;
    }

    .back-link a:hover {
        color: #ffd700;
    }

    .info-box {
        background: rgba(212, 175, 55, 0.1);
        padding: 1rem;
        border-radius: 10px;
        border-left: 4px solid #d4af37;
        margin-bottom: 1.5rem;
    }

    .info-box p {
        color: #d4af37;
        margin: 0;
        font-size: 0.9rem;
    }
</style>

<div class="forgot-container">
    <div class="forgot-box">
        <div class="forgot-header">
            <h2>Forgot Password</h2>
            <p>Enter your email to receive reset instructions</p>
        </div>

        <div class="info-box">
            <p>We'll send you an email with a link to reset your password. The link will expire in 1 hour.</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
            </div>

            <button type="submit" class="submit-btn">Send Reset Link</button>
        </form>

        <div class="back-link">
            <a href="{{ url_for('main.login') }}">← Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
