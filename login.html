{% extends "base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto; background: rgba(139, 0, 0, 0.2); padding: 2rem; border-radius: 10px;">
    <h2 style="text-align: center; margin-bottom: 2rem;">Login to CityWok</h2>
    
    <form method="POST">
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem;">Username:</label>
            <input type="text" name="username" required style="width: 100%; padding: 0.75rem; border: 1px solid #d4af37; border-radius: 5px; background: #2d1f1f; color: #d4af37;">
        </div>
        
        <div style="margin-bottom: 2rem;">
            <label style="display: block; margin-bottom: 0.5rem;">Password:</label>
            <input type="password" name="password" required style="width: 100%; padding: 0.75rem; border: 1px solid #d4af37; border-radius: 5px; background: #2d1f1f; color: #d4af37;">
        </div>
        
        <button type="submit" class="btn" style="width: 100%;">Login</button>
    </form>
    
    <div style="text-align: center; margin-top: 1.5rem;">
        <a href="{{ url_for('main.forgot_password') }}" style="color: #d4af37; text-decoration: none; transition: color 0.3s ease;">Forgot Password?</a>
    </div>
    
    <p style="text-align: center; margin-top: 1rem;">
        Don't have an account? <a href="{{ url_for('main.register') }}" style="color: #ffd700;">Register here</a>
    </p>
</div>
{% endblock %}
